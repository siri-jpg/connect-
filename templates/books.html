{% extends "base.html" %}

{% block content %}

<section class="library-section">

<h1 class="library-title">Sign Language Library</h1>

<div class="search-container">
    <input type="text" placeholder="Search books or courses..." class="search-box">
    <button class="search-btn">Search</button>
</div>

<div class="library-container">

    <div class="book-card">
        <a href="{{ url_for('view_pdf', filename='asl_easy_way.pdf') }}">
            <img src="{{ url_for('static', filename='images/book1.png') }}">
            <h3>ASL Easy Way</h3>
        </a>
    </div>

    <div class="book-card">
        <a href="{{ url_for('view_pdf', filename='asl_dictionary.pdf') }}">
            <img src="{{ url_for('static', filename='images/book2.png') }}">
            <h3>The Joy of Sign</h3>
        </a>
    </div>

    <div class="book-card">
        <a href="{{ url_for('view_pdf', filename='asl_beginner.pdf') }}">
            <img src="{{ url_for('static', filename='images/book3.png') }}">
            <h3>Sign Language Companion</h3>
        </a>
    </div>

    <div class="book-card">
        <a href="{{ url_for('view_pdf', filename='asl_beginner.pdf') }}">
            <img src="{{ url_for('static', filename='images/book4.png') }}">
            <h3>Language And Deafness</h3>
        </a>
    </div>

</div>

</section>

{% endblock %}
